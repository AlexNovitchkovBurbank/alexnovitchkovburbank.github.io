<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav>
      <div class="NavDiv">
        <a href="./index.html">Home</a>
      </div>
      <div class="NavDiv">
        <a href="./PreviousWork.html">Previous Work</a>
      </div>
      <div class="NavDiv">
        <a href="./Projects.html">Projects</a>
      </div>
      <div class="NavDiv">
        <a href="./Contact.html">Contact</a>
      </div>
    </nav>
    <main>
      <h1>Contact</h1>
      <div class="box">
        <h2 class="bold">Sign Up Form</h2>
        <p class="h3Contact">Fill up the items in the form below.</p>
        <form action="./Contact.html">
          <label for="Name">Name: </label>
          <input type="text" name="Name" id="Name" />
          <span class="Astrisk">*</span>
          <br />
          <br />
          <label for="Username">Username: </label>
          <input type="text" name="Username" id="Username" />
          <br />
          <br />
          <label for="Email">Email: </label>
          <input type="email" name="Email" id="Email" />
          <span class="Astrisk">*</span>
          <br />
          <br />
          <label for="Password">Password: </label>
          <input type="password" name="Password" id="Password" />
          <span class="Astrisk">*</span>
          <br />
          <br />
          <label for="DateOfBirth">Date of birth: </label>
          <input type="date" name="DateOfBirth" id="DateOfBirth" />
          <br />
          <br />
          <h3>Preferred Pronouns:</h3>
          <!-- Wave wants a fieldset for accessibility -->
          <fieldset class="radioButtonBlock">
            <legend>Pronouns</legend>
            <input type="radio" name="Pronouns" id="She/her" value="She/her" />
            <label for="She/her">She/her</label>
            <br />
            <input type="radio" name="Pronouns" id="He/him" value="He/him" />
            <label for="He/him">He/him</label>
            <br />
            <input
              type="radio"
              name="Pronouns"
              id="They/them"
              value="They/them"
            />
            <label for="They/them">They/them</label>
            <br />
            <input
              type="radio"
              name="Pronouns"
              id="PreferNotToSay"
              value="PreferNotToSay"
            />
            <label for="PreferNotToSay">I prefer not to say</label>
          </fieldset>
          <br />
          <button type="submit" class="button, submit" id="submit">
            Submit
          </button>
          <button type="reset" class="button, cancel" id="cancel">
            Cancel
          </button>
        </form>
      </div>
      <script src="./Contact.js"></script>
    </main>
  </body>
</html>
